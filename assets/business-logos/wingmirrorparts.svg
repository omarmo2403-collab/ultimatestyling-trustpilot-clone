<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 198 149" width="198" height="149" role="img" aria-label="Wing mirror parts logo">
    <defs>
        <linearGradient id="wm-bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1B1B2F"/>
            <stop offset="1" stop-color="#0B0B14"/>
        </linearGradient>
        <linearGradient id="wm-housing" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFCB2D"/>
            <stop offset="0.55" stop-color="#F2A900"/>
            <stop offset="1" stop-color="#B97A00"/>
        </linearGradient>
        <linearGradient id="wm-glass" x1="0.1" y1="0" x2="0.9" y2="1">
            <stop offset="0" stop-color="#FFE9A8"/>
            <stop offset="0.45" stop-color="#F2A900"/>
            <stop offset="1" stop-color="#7A4B00"/>
        </linearGradient>
        <linearGradient id="wm-stem" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#6B6B6B"/>
            <stop offset="0.5" stop-color="#C8C8C8"/>
            <stop offset="1" stop-color="#3A3A3A"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="198" height="149" fill="url(#wm-bg)"/>

    <!-- Motion streaks -->
    <g stroke="#F2A900" stroke-linecap="round" stroke-opacity="0.85">
        <line x1="6"  y1="96"  x2="58" y2="96"  stroke-width="3"/>
        <line x1="14" y1="106" x2="62" y2="106" stroke-width="3"/>
        <line x1="22" y1="116" x2="66" y2="116" stroke-width="3"/>
    </g>

    <!-- Mirror stem (mounting arm) -->
    <path d="M52 110 Q60 96 80 90 L96 96 L88 116 Z" fill="url(#wm-stem)"/>

    <!-- Mirror housing (the yellow shell) -->
    <path d="M58 42
             Q66 28 92 28
             L160 28
             Q176 28 178 44
             L178 88
             Q176 104 158 106
             L84 106
             Q60 106 56 88
             Z"
          fill="url(#wm-housing)" stroke="#5A3A00" stroke-width="1.5"/>

    <!-- Glass / reflective surface -->
    <path d="M72 46
             Q78 38 98 38
             L156 38
             Q168 38 170 50
             L170 84
             Q168 96 154 96
             L92 96
             Q72 96 70 84
             Z"
          fill="url(#wm-glass)"/>

    <!-- Glass highlight (top sheen) -->
    <path d="M82 46 Q92 42 120 42 L150 42 Q158 42 160 48
             L150 54 Q120 52 96 56 Q86 58 82 60 Z"
          fill="#FFFFFF" fill-opacity="0.32"/>

    <!-- Subtle bottom glow on glass -->
    <ellipse cx="120" cy="92" rx="40" ry="4" fill="#000" fill-opacity="0.25"/>
</svg>
