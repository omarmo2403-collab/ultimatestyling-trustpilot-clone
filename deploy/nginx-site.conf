# ===============================================================
# nginx site config — PRIVATE / NO-INDEX / BOT-BLOCKED
# Replace __DOMAIN__ with your actual domain before installing.
# ===============================================================

# ---------- 1. Block bad bots by User-Agent (return 403) ----------
# This `map` returns "1" for any UA we don't want, "0" for humans.
map $http_user_agent $is_bot {
    default 0;

    # Search engines
    ~*googlebot                    1;
    ~*bingbot                      1;
    ~*slurp                        1;
    ~*duckduckbot                  1;
    ~*baiduspider                  1;
    ~*yandexbot                    1;
    ~*sogou                        1;
    ~*exabot                       1;
    ~*facebookexternalhit          1;
    ~*twitterbot                   1;
    ~*linkedinbot                  1;
    ~*whatsapp                     1;
    ~*telegrambot                  1;
    ~*pinterest                    1;

    # AI / LLM crawlers
    ~*GPTBot                       1;
    ~*ChatGPT-User                 1;
    ~*OAI-SearchBot                1;
    ~*ClaudeBot                    1;
    ~*Claude-Web                   1;
    ~*anthropic-ai                 1;
    ~*Bytespider                   1;
    ~*PerplexityBot                1;
    ~*Perplexity-User              1;
    ~*Applebot                     1;
    ~*CCBot                        1;
    ~*Diffbot                      1;
    ~*Meta-ExternalAgent           1;
    ~*Meta-ExternalFetcher         1;
    ~*FacebookBot                  1;
    ~*ImagesiftBot                 1;
    ~*Amazonbot                    1;
    ~*cohere-ai                    1;
    ~*Timpibot                     1;
    ~*ICC-Crawler                  1;
    ~*omgili                       1;

    # SEO / scraping
    ~*AhrefsBot                    1;
    ~*SemrushBot                   1;
    ~*MJ12bot                      1;
    ~*DotBot                       1;
    ~*BLEXBot                      1;
    ~*rogerbot                     1;
    ~*SerpstatBot                  1;
    ~*PetalBot                     1;
    ~*DataForSeoBot                1;
    ~*ZoominfoBot                  1;
    ~*screaming\sfrog              1;

    # Archive
    ~*ia_archiver                  1;
    ~*archive\.org_bot             1;
    ~*Wayback                      1;

    # Generic scrapers / no-UA / scripted clients
    ~*curl                         1;
    ~*wget                         1;
    ~*python-requests              1;
    ~*python-urllib                1;
    ~*Go-http-client               1;
    ~*Java/                        1;
    ~*Scrapy                       1;
    ~*HeadlessChrome               1;
    ~*PhantomJS                    1;
    ~*HTTrack                      1;
}

# ---------- 2. HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Allow Let's Encrypt challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- 3. Main HTTPS server ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__ www.__DOMAIN__;

    root /var/www/__DOMAIN__;
    index index.html;

    # ---- SSL ---- (paths filled in by certbot)
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex, nocache" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ---- Block bots at server level BEFORE auth ----
    # (so we don't even reveal "auth needed", we just say "go away")
    if ($is_bot) {
        return 403 "Forbidden";
    }

    # Reject requests with no User-Agent at all (often scrapers)
    if ($http_user_agent = "") {
        return 403 "Forbidden";
    }

    # ---- HTTP Basic Auth — every request must authenticate ----
    auth_basic           "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Allow robots.txt without auth so the few bots that DO respect it can see "Disallow: /"
    location = /robots.txt {
        auth_basic off;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri =404;
    }

    # ---- Static asset caching ----
    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|avif|svg|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri =404;
    }

    # ---- HTML — never cache (so updates show immediately) ----
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex, nocache" always;
        try_files $uri =404;
    }

    # ---- Default ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Hide nginx version ----
    server_tokens off;

    # ---- Block hidden files (.git, .env, etc.) ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
